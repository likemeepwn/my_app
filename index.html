<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: sans-serif; padding: 10px; margin: 0; }
        
        #app {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            gap: 12px;
            padding: 10px;
        }

        .nft-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .nft-header { display: flex; align-items: center; margin-bottom: 10px; }
        .nft-image { width: 40px; height: 40px; border-radius: 6px; margin-right: 8px; }
        .nft-name { font-weight: bold; font-size: 13px; line-height: 1.2; }

        .market-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 11px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .market-logo { width: 14px; height: 14px; margin-right: 5px; }
        .market-price { font-weight: bold; color: #0088cc; }
        .loading { grid-column: span 2; text-align: center; margin-top: 50px; opacity: 0.6; }
    </style>
</head>
<body>
    <h2 style="text-align: center; font-size: 18px;">Мониторинг цен</h2>
    <div id="app">
        <div class="loading">Подключение к блокчейну TON...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();


        const collections = [
            {name: "Spoon Dog", img: "https://ddejfvww7sqtk.cloudfront.net/images/attrs/EQAoJw7BpOcBD3y9voMuEQ-qhS3K4gtM-6EePLxkzk8iSifX/RVFBb0p3N0JwT2NCRDN5OXZvTXVFUS1xaFMzSzRndE0tNkVlUEx4a3prOGlTaWZY.webp", addr: "EQAoJw7BpOcBD3y9voMuEQ-qhS3K4gtM-6EePLxkzk8iSifX"},
            {name: "Candy Cane", img: "https://ddejfvww7sqtk.cloudfront.net/images/attrs/EQDLM65t0shS7gZAg0lMltGHYhsU94PzsMJHhYibmRV7kdUs/RVFETE02NXQwc2hTN2daQWcwbE1sdEdIWWhzVTk0UHpzTUpIaFlpYm1SVjdrZFVz.webp", addr: "EQDLM65t0shS7gZAg0lMltGHYhsU94PzsMJHhYibmRV7kdUs"},
            {name: "Chill Flame", img: "https://i.getgems.io/dNhsTGUrYE5c9D2s0VqA8Tc6Imtpo6-pcDuZlgyZdZI/rs:fill:200:200:1/g:ce/czM6Ly9nZXRnZW1zLXMzL25mdC1jb250ZW50LWNhY2hlL2ltYWdlcy9FUUJsQko0bjAxcG1ZZXo1VlBkOFdvNTk4czhhZ2JRQ3lWT2p1Y1hLeExEQWk5cjcvMjdkZGZjYzhjMWZmNWRhZg", addr: "EQBlBJ4n01pmYez5VPd8Wo598s8agbQCyVOjucXKxLDAi9r7"},
            {name: "Ginger Cookie", img: "https://ddejfvww7sqtk.cloudfront.net/images/attrs/EQBCe75G0AhjqC64B7H_BHP0wgfONX_x98rszmsEwndDVAjG/RVFCQ2U3NUcwQWhqcUM2NEI3SF9CSFAwd2dmT05YX3g5OHJzem1zRXduZERWQWpH.webp", addr: "EQBCe75G0AhjqC64B7H_BHP0wgfONX_x98rszmsEwndDVAjG"},
        ];

        async function loadPrices() {
            const app = document.getElementById('app');
            let html = '';

            for (const item of collections) {
                try {
                    const response = await fetch(`https://newev-87-252-229-63.run.pinggy-free.link`);
                    const data = await response.json();
                    const floor = data.stats.floor_price ? (data.stats.floor_price / 1000000000).toFixed(2) : "Н/Д";

                    html += `
                        <div class="nft-card">
                            <div class="nft-header">
                                <img src="${item.img}" class="nft-image">
                                <span class="nft-name">${item.name}</span>
                            </div>
                            <div class="market-row">
                                <span><img src="https://fragment.com/favicon.ico" class="market-logo">Frag</span>
                                <span class="market-price">${floor}</span>
                            </div>
                            <div class="market-row">
                                <span><img src="https://getgems.io/favicon.ico" class="market-logo">Gems</span>
                                <span class="market-price">${floor}</span>
                            </div>
                        </div>
                    `;
                } catch (e) { console.error(e); }
            }
            app.innerHTML = html;
        }
        setInterval(loadPrices, 45000); // обновление каждые 45 сек
        loadPrices();
    </script>
</body>
</html>
